{% extends "base.html" %}
{% block title %}Login — Insect Kingdom{% endblock %}

{% block content %}
<section class="ik-auth-section py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="ik-auth-card">
          <h3 class="text-center mb-1">Welcome Back</h3>
          <p class="text-center text-muted mb-4">Login to your Insect Kingdom account</p>
          <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn ik-btn-primary w-100 btn-lg mt-2">Login</button>
          </form>
          <p class="text-center mt-4 mb-0">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
